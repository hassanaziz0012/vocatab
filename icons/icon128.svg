    <rect x="-6" y="-28" width="12" height="56" rx="2" fill="#c4b5fd" opacity="0.3"/>
    <!-- Lines left -->
    <line x1="-24" y1="-14" x2="-12" y2="-14" stroke="#1a1a3e" stroke-width="2" stroke-linecap="round"/>
    <line x1="-24" y1="-4" x2="-12" y2="-4" stroke="#1a1a3e" stroke-width="2" stroke-linecap="round"/>
    <line x1="-24" y1="6" x2="-12" y2="6" stroke="#1a1a3e" stroke-width="2" stroke-linecap="round"/>
    <!-- Lines right -->
    <line x1="12" y1="-14" x2="24" y2="-14" stroke="#1a1a3e" stroke-width="2" stroke-linecap="round"/>
    <line x1="12" y1="-4" x2="24" y2="-4" stroke="#1a1a3e" stroke-width="2" stroke-linecap="round"/>
    <line x1="12" y1="6" x2="24" y2="6" stroke="#1a1a3e" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
